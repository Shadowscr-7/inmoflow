# ═══════════════════════════════════════════════════════════════
# InmoFlow — Docker Compose PRODUCCIÓN
# ═══════════════════════════════════════════════════════════════
#
# Integrado con Traefik existente en el servidor.
# NO usa Nginx ni Certbot — Traefik maneja SSL y routing.
#
# Requisitos del servidor:
#   - Traefik corriendo con Docker provider
#   - Red Docker compartida (ver TRAEFIK_NETWORK en .env)
#
# Uso:
#   1. cp .env.production.example .env
#   2. Editar .env con valores reales
#   3. docker compose -f docker-compose.prod.yml --profile migrate run --rm inmoflow-migrate
#   4. docker compose -f docker-compose.prod.yml up -d
#
# Actualizar:
#   sudo bash scripts/update.sh
#
# Backup manual:
#   docker compose -f docker-compose.prod.yml --profile backup run --rm inmoflow-backup
#
# ⚠  Docker Compose lee .env automáticamente. NO usar --env-file.
# ═══════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL (instancia propia — NO toca el postgres existente) ──
  inmoflow-db:
    image: postgres:16-alpine
    container_name: inmoflow-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-inmoflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Variable DB_PASSWORD requerida}
      POSTGRES_DB: ${DB_NAME:-inmoflow}
    volumes:
      - inmoflow_pgdata:/var/lib/postgresql/data
    networks:
      - inmoflow
    # ⛔ NO se expone puerto al host (evita conflicto con root-evolution-postgres-1)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inmoflow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Redis (instancia propia — NO toca el redis existente) ─────────
  inmoflow-redis:
    image: redis:7-alpine
    container_name: inmoflow-redis
    restart: always
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?Variable REDIS_PASSWORD requerida}
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    volumes:
      - inmoflow_redisdata:/data
    networks:
      - inmoflow
    # ⛔ NO se expone puerto al host (evita conflicto con root-redis-1)
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── API (NestJS) ──────────────────────────────────────────────────
  inmoflow-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: inmoflow-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-inmoflow}:${DB_PASSWORD}@inmoflow-db:5432/${DB_NAME:-inmoflow}?schema=public
      REDIS_HOST: inmoflow-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Variable JWT_SECRET requerida}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Variable ENCRYPTION_KEY requerida}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      API_PORT: 4000
      NODE_ENV: production
      CORS_ORIGINS: https://${DOMAIN:?Variable DOMAIN requerida}
      FRONTEND_URL: https://${DOMAIN}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-contacthouse.com.uy}
      WEBHOOK_BASE_URL: https://${DOMAIN}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      MELI_CLIENT_ID: ${MELI_CLIENT_ID:-}
      MELI_CLIENT_SECRET: ${MELI_CLIENT_SECRET:-}
      MELI_REDIRECT_URI: ${MELI_REDIRECT_URI:-}
    depends_on:
      inmoflow-db:
        condition: service_healthy
      inmoflow-redis:
        condition: service_healthy
    networks:
      - inmoflow
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-root_proxy}"
      # ── HTTPS: /api + /ws → API container (puerto 4000) ────
      - "traefik.http.routers.inmoflow-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.inmoflow-api.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.inmoflow-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      - "traefik.http.routers.inmoflow-api.priority=10"
      - "traefik.http.services.inmoflow-api.loadbalancer.server.port=4000"
      # ── HTTP → HTTPS redirect para /api + /ws ──────────────
      - "traefik.http.routers.inmoflow-api-http.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.inmoflow-api-http.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web}"
      - "traefik.http.routers.inmoflow-api-http.middlewares=inmoflow-redirect-https"
      - "traefik.http.middlewares.inmoflow-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.inmoflow-redirect-https.redirectscheme.permanent=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Worker (BullMQ — sin puertos, solo procesa colas) ─────────────
  inmoflow-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: inmoflow-worker
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-inmoflow}:${DB_PASSWORD}@inmoflow-db:5432/${DB_NAME:-inmoflow}?schema=public
      REDIS_HOST: inmoflow-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Variable JWT_SECRET requerida}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Variable ENCRYPTION_KEY requerida}
      NODE_ENV: production
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
    depends_on:
      inmoflow-db:
        condition: service_healthy
      inmoflow-redis:
        condition: service_healthy
    networks:
      - inmoflow
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Web (Next.js) ─────────────────────────────────────────────────
  inmoflow-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        # Vacío = misma URL base. Traefik enruta /api → API internamente
        NEXT_PUBLIC_API_URL: ""
    container_name: inmoflow-web
    restart: always
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    depends_on:
      inmoflow-api:
        condition: service_healthy
    networks:
      - inmoflow
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-root_proxy}"
      # ── HTTPS: todo lo demás → Web container (puerto 3000) ──
      - "traefik.http.routers.inmoflow-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.inmoflow-web.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.inmoflow-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      - "traefik.http.routers.inmoflow-web.priority=1"
      - "traefik.http.services.inmoflow-web.loadbalancer.server.port=3000"
      # ── HTTP → HTTPS redirect ──────────────────────────────
      - "traefik.http.routers.inmoflow-web-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.inmoflow-web-http.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web}"
      - "traefik.http.routers.inmoflow-web-http.middlewares=inmoflow-redirect-https"
      # ── Middleware compartido HTTP→HTTPS ────────────────────
      - "traefik.http.middlewares.inmoflow-redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.inmoflow-redirect-https.redirectscheme.permanent=true"
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Migraciones DB (ejecutar 1 vez) ───────────────────────────────
  inmoflow-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: inmoflow-migrate
    command: >
      sh -c "cd /app/packages/db && npx prisma migrate deploy && npx tsx src/seed.ts"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-inmoflow}:${DB_PASSWORD}@inmoflow-db:5432/${DB_NAME:-inmoflow}?schema=public
    depends_on:
      inmoflow-db:
        condition: service_healthy
    restart: "no"
    profiles:
      - migrate
    networks:
      - inmoflow

  # ─── Backup manual de BD ───────────────────────────────────────────
  inmoflow-backup:
    image: postgres:16-alpine
    container_name: inmoflow-backup
    restart: "no"
    environment:
      PGHOST: inmoflow-db
      PGUSER: ${DB_USER:-inmoflow}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME:-inmoflow}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "pg_dump -Fc > /backups/inmoflow_$$(date +%Y%m%d_%H%M%S).dump
             && echo 'Backup completado'
             && find /backups -name '*.dump' -mtime +30 -delete
             && echo 'Backups antiguos eliminados'"
    depends_on:
      inmoflow-db:
        condition: service_healthy
    profiles:
      - backup
    networks:
      - inmoflow

# ─── Volúmenes (prefijados para no colisionar) ──────────────────────
volumes:
  inmoflow_pgdata:
  inmoflow_redisdata:

# ─── Redes ───────────────────────────────────────────────────────────
networks:
  # Red interna privada de InmoFlow
  inmoflow:
    driver: bridge
  # Red externa compartida con Traefik (para que descubra los servicios)
  traefik_net:
    external: true
    name: ${TRAEFIK_NETWORK:-root_proxy}
